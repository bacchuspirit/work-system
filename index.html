<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>工作日系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #1E2235;
    --navy-2:  #252A40;
    --navy-3:  #2F3550;
    --white:   #FFFFFF;
    --bg:      #F5F6F8;
    --bg-2:    #ECEEF2;
    --mint:    #00C48C;
    --mint-lt: #E6F9F3;
    --mint-dk: #009E70;
    --coral:   #F24E4E;
    --coral-lt:#FEF0F0;
    --purple:  #7B6EF6;
    --purple-lt:#F0EFFE;
    --text-1:  #1A1D2E;
    --text-2:  #5A5E72;
    --text-3:  #9A9DB0;
    --border:  #E2E4EC;
    --radius:  10px;
    --radius-lg: 14px;
  }

  html { font-size: 16px; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-1);
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--navy);
    padding: 0 28px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 20px; }
  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
  }
  .logo-icon {
    width: 30px; height: 30px;
    background: var(--mint);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 16px; height: 16px; }
  .logo-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .topbar-divider {
    width: 1px; height: 20px;
    background: var(--navy-3);
  }
  .date-chip {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.2px;
  }
  .clock-display {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1;
  }
  .clock-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--mint);
    margin-right: 8px;
    animation: pulse 2s ease-in-out infinite;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(0.7); }
  }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 1060px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 720px) {
    .grid { grid-template-columns: 1fr; }
    .topbar { padding: 0 16px; }
    .main { padding: 20px 16px 60px; }
  }

  /* ── SECTION CARDS ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .card-head {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-1);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .card-title svg { color: var(--text-3); }
  .pill {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--bg-2);
    color: var(--text-2);
  }
  .pill.active { background: var(--mint-lt); color: var(--mint-dk); }
  .card-body { padding: 16px 20px 20px; }

  /* ── ADD ROW ── */
  .add-row {
    display: flex;
    gap: 7px;
    margin-bottom: 14px;
  }
  .add-row input {
    flex: 1;
    height: 38px;
    padding: 0 12px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-1);
    outline: none;
    transition: border-color .15s, background .15s;
  }
  .add-row input:focus {
    border-color: var(--purple);
    background: var(--white);
  }
  .add-row input::placeholder { color: var(--text-3); }
  .btn-add {
    width: 38px; height: 38px;
    border: none;
    border-radius: var(--radius);
    background: var(--navy);
    color: #fff;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s;
  }
  .btn-add:hover { background: var(--navy-3); }

  /* ── EMPLOYEE ROWS ── */
  .emp-list { display: flex; flex-direction: column; gap: 8px; }
  .emp-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    transition: border-color .2s, background .2s;
  }
  .emp-row.checked-in {
    border-color: #b2ecd8;
    background: var(--mint-lt);
  }
  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .emp-info { flex: 1; min-width: 0; }
  .emp-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .emp-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    margin-top: 1px;
  }
  .emp-time.on { color: var(--mint-dk); }
  .btn-clock {
    height: 30px;
    padding: 0 12px;
    border: none;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
    transition: opacity .15s, transform .1s;
  }
  .btn-clock:active { transform: scale(0.96); }
  .btn-in  { background: var(--mint);  color: #fff; }
  .btn-in:hover  { opacity: .88; }
  .btn-out { background: var(--coral); color: #fff; }
  .btn-out:hover { opacity: .88; }
  .btn-remove {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px;
    flex-shrink: 0;
    transition: color .15s;
  }
  .btn-remove:hover { color: var(--coral); }

  /* ── TODO ── */
  .todo-list { display: flex; flex-direction: column; gap: 6px; }
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    transition: opacity .2s;
  }
  .todo-item.done { opacity: .55; }
  .check-btn {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--white);
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, background .15s;
    margin-top: 1px;
  }
  .check-btn:hover { border-color: var(--mint); }
  .check-btn.checked {
    background: var(--mint);
    border-color: var(--mint);
  }
  .check-btn.checked::after {
    content: '';
    width: 6px; height: 10px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(42deg) translate(-1px,-1px);
    display: block;
  }
  .todo-text {
    flex: 1;
    font-size: 13px;
    color: var(--text-1);
    line-height: 1.6;
    min-width: 0;
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* textarea 新增代辦 */
  .todo-textarea {
    width: 100%;
    min-height: 64px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-1);
    outline: none;
    resize: vertical;
    transition: border-color .15s, background .15s;
  }
  .todo-textarea:focus { border-color: var(--purple); background: var(--white); }
  .todo-textarea::placeholder { color: var(--text-3); }
  .todo-add-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }
  .btn-add-todo {
    align-self: flex-end;
    height: 34px;
    padding: 0 14px;
    border: none;
    border-radius: var(--radius);
    background: var(--navy);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background .15s;
  }
  .btn-add-todo:hover { background: var(--navy-3); }
  .todo-text.done {
    text-decoration: line-through;
    color: var(--text-3);
  }
  .btn-del, .btn-copy {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    padding: 2px;
    flex-shrink: 0;
    opacity: 0;
    transition: color .15s, opacity .15s;
  }
  .todo-item:hover .btn-del,
  .todo-item:hover .btn-copy { opacity: 1; }
  .btn-del:hover  { color: var(--coral); }
  .btn-copy:hover { color: var(--purple); }

  .todo-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .todo-stat { font-size: 12px; color: var(--text-3); }
  .btn-clear {
    font-size: 12px;
    padding: 5px 11px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-2);
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: background .15s, color .15s, border-color .15s;
  }
  .btn-clear:hover {
    background: var(--coral-lt);
    border-color: #f9b0b0;
    color: var(--coral);
  }
  .empty-hint {
    text-align: center;
    padding: 24px 0;
    font-size: 13px;
    color: var(--text-3);
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin-top: 10px; }
  .progress-bar {
    height: 4px;
    background: var(--bg-2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--mint);
    border-radius: 2px;
    transition: width .4s ease;
  }
  .progress-label {
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
  }



  /* ── TOAST ── */
  .toast-container {
    position: fixed;
    bottom: 28px;
    right: 28px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 9999;
    pointer-events: none;
  }
  .toast {
    background: var(--navy);
    color: #fff;
    font-size: 13px;
    padding: 10px 16px;
    border-radius: var(--radius);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .25s, transform .25s;
    max-width: 280px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-left: 3px solid var(--mint); }
  .toast.info    { border-left: 3px solid var(--purple); }
  .toast.warn    { border-left: 3px solid #f0a030; }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <a class="logo" href="#">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="5" height="5" rx="1.2" fill="white"/>
          <rect x="9" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".6"/>
          <rect x="2" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".6"/>
          <rect x="9" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".35"/>
        </svg>
      </div>
      <span class="logo-name">工作日系統</span>
    </a>
    <div class="topbar-divider"></div>
    <span class="date-chip" id="date-chip"></span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="clock-dot"></span>
    <span class="clock-display" id="live-clock">--:--:--</span>
  </div>
</header>

<!-- MAIN -->
<main class="main">
  <div class="grid">

    <!-- LEFT: ATTENDANCE -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0 1 13 0"/></svg>
          員工打卡
        </span>
        <span class="pill active" id="in-badge">0 人上班中</span>
      </div>
      <div class="card-body">
        <div class="add-row">
          <input type="text" id="new-emp" placeholder="輸入員工姓名新增..." />
          <button class="btn-add" onclick="addEmp()" aria-label="新增員工">+</button>
        </div>
        <div class="emp-list" id="emp-list"></div>
      </div>
    </div>

    <!-- RIGHT: TODO -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          今日代辦
        </span>
        <span class="pill" id="todo-badge">0 項</span>
      </div>
      <div class="card-body">
        <div class="todo-add-row">
          <textarea class="todo-textarea" id="new-todo" rows="3" placeholder="輸入待辦事項（可換行，Ctrl+Enter 新增）…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
          <button class="btn-add-todo" onclick="addTodo()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新增事項
          </button>
        </div>
        <div id="todo-list" class="todo-list"></div>
        <div class="progress-wrap" id="progress-wrap" style="display:none">
          <div class="progress-label">
            <span id="progress-text">完成進度</span>
            <span id="progress-pct">0%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        </div>
        <div class="todo-footer">
          <span class="todo-stat" id="todo-stat"></span>
          <button class="btn-clear" onclick="clearDone()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            清除完成項目
          </button>
        </div>
      </div>
    </div>

  </div>


</main>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<script>
  const EMP_PALETTES = [
    ['#EEF0FF','#5A52D5'],['#E6F9F3','#009E70'],['#FFF0EC','#D84A1B'],
    ['#FFF5E6','#C47A15'],['#F9EEFF','#8B3FD4'],['#E8F5FF','#1A6FB8'],
    ['#FFEEF5','#C4306A'],['#F0FFF4','#276E3C']
  ];
  let emps   = JSON.parse(localStorage.getItem('wds_emps')   || '["王小明","李美華","陳大偉","林志玲"]');
  let states = JSON.parse(localStorage.getItem('wds_states') || '{}');
  let todos  = JSON.parse(localStorage.getItem('wds_todos')  || '[]');

  function persist() {
    localStorage.setItem('wds_emps',   JSON.stringify(emps));
    localStorage.setItem('wds_states', JSON.stringify(states));
    localStorage.setItem('wds_todos',  JSON.stringify(todos));
  }

  function initials(n) { return n.length >= 2 ? n.slice(-2) : n; }

  /* ── RENDER EMPLOYEES ── */
  function renderEmps() {
    const list = document.getElementById('emp-list');
    list.innerHTML = '';
    let inCount = 0;
    emps.forEach((name, i) => {
      const s = states[name] || { on: false, in: null, out: null };
      if (s.on) inCount++;
      const [bg, fg] = EMP_PALETTES[i % EMP_PALETTES.length];

      const row = document.createElement('div');
      row.className = 'emp-row' + (s.on ? ' checked-in' : '');

      let timeStr = '尚未打卡';
      let timeClass = '';
      if (s.on  && s.in)  { timeStr = '上班中  ' + s.in; timeClass = 'on'; }
      else if (s.in)       { timeStr = s.in + (s.out ? '  →  ' + s.out : ''); }

      row.innerHTML = `
        <div class="avatar" style="background:${bg};color:${fg}">${initials(name)}</div>
        <div class="emp-info">
          <div class="emp-name">${esc(name)}</div>
          <div class="emp-time ${timeClass}">${timeStr}</div>
        </div>
        ${s.on
          ? `<button class="btn-clock btn-out" onclick="clock('${esc(name)}',false)">
               <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
               下班
             </button>`
          : `<button class="btn-clock btn-in" onclick="clock('${esc(name)}',true)">
               <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
               上班
             </button>`
        }
        <button class="btn-remove" onclick="removeEmp(${i})" aria-label="移除 ${esc(name)}">×</button>
      `;
      list.appendChild(row);
    });
    const badge = document.getElementById('in-badge');
    badge.textContent = inCount + ' 人上班中';
    badge.className = 'pill' + (inCount > 0 ? ' active' : '');
  }

  /* ── CLOCK ACTION ── */
  function clock(name, goIn) {
    const now  = new Date();
    const time = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const date = now.toLocaleDateString('zh-TW');
    if (!states[name]) states[name] = { on: false, in: null, out: null };
    if (goIn) {
      states[name] = { on: true, in: time, out: null };
      sendSheet(name, date, time, '');
      toast(name + '  上班打卡  ' + time, 'success');
    } else {
      states[name].on  = false;
      states[name].out = time;
      sendSheet(name, date, states[name].in, time);
      toast(name + '  下班打卡  ' + time, 'info');
    }
    persist(); renderEmps();
  }

  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyUTNmo9bAMfMgtrsNeX-yoDdG9pk30WNY6J-QiozGr-JEqs_7qas3-cO63-0t8YWT-Pg/exec';

  function sendSheet(name, date, inT, outT) {
    fetch(SHEET_URL + '?' + new URLSearchParams({ name, date, in: inT, out: outT }), { mode: 'no-cors' }).catch(() => {});
  }

  function addEmp() {
    const inp = document.getElementById('new-emp');
    const n = inp.value.trim();
    if (!n) return;
    if (emps.includes(n)) { toast('員工已存在', 'warn'); return; }
    emps.push(n); persist(); inp.value = ''; renderEmps();
  }

  function removeEmp(i) {
    if (!confirm('確定移除「' + emps[i] + '」？')) return;
    delete states[emps[i]]; emps.splice(i, 1); persist(); renderEmps();
  }

  /* ── RENDER TODOS ── */
  function renderTodos() {
    const list = document.getElementById('todo-list');
    list.innerHTML = '';
    const total = todos.length;
    const done  = todos.filter(t => t.done).length;

    if (!total) {
      list.innerHTML = '<div class="empty-hint">今天還沒有待辦事項</div>';
    } else {
      todos.forEach((t, i) => {
        const item = document.createElement('div');
        item.className = 'todo-item' + (t.done ? ' done' : '');
        item.innerHTML = `
          <button class="check-btn ${t.done ? 'checked' : ''}" onclick="toggleTodo(${i})" aria-label="切換完成"></button>
          <span class="todo-text ${t.done ? 'done' : ''}">${esc(t.text)}</span>
          <button class="btn-copy" onclick="copyTodo(${i})" aria-label="複製" title="複製文字">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="btn-del" onclick="delTodo(${i})" aria-label="刪除">×</button>
        `;
        list.appendChild(item);
      });
    }

    document.getElementById('todo-badge').textContent = total + ' 項';
    document.getElementById('todo-stat').textContent  = total ? done + ' / ' + total + ' 完成' : '';

    const pw = document.getElementById('progress-wrap');
    pw.style.display = total ? 'block' : 'none';
    if (total) {
      const pct = Math.round(done / total * 100);
      document.getElementById('progress-pct').textContent  = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';
    }
  }

  function addTodo() {
    const ta = document.getElementById('new-todo');
    const t  = ta.value.trim();
    if (!t) return;
    todos.push({ text: t, done: false }); persist(); ta.value = ''; renderTodos();
  }

  function toggleTodo(i) { todos[i].done = !todos[i].done; persist(); renderTodos(); }

  function delTodo(i) { todos.splice(i, 1); persist(); renderTodos(); }

  function copyTodo(i) {
    const text = todos[i].text;
    navigator.clipboard.writeText(text).then(() => {
      toast('已複製到剪貼簿', 'info');
    }).catch(() => {
      // 備援：舊瀏覽器用 execCommand
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      toast('已複製到剪貼簿', 'info');
    });
  }

  function clearDone() {
    if (!todos.some(t => t.done)) { toast('沒有已完成的事項', 'warn'); return; }
    if (!confirm('確定清除所有已完成的事項？')) return;
    todos = todos.filter(t => !t.done); persist(); renderTodos(); toast('已清除完成項目', 'info');
  }



  /* ── TOAST ── */
  function toast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    container.appendChild(el);
    requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('show')); });
    setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 300);
    }, 2600);
  }

  /* ── CLOCK ── */
  function tick() {
    const now  = new Date();
    document.getElementById('live-clock').textContent = now.toLocaleTimeString('zh-TW');
    document.getElementById('date-chip').textContent  = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── KEYBOARD ── */
  document.addEventListener('keydown', e => {
    if (e.target.id === 'new-emp'  && e.key === 'Enter') addEmp();
    if (e.target.id === 'new-todo' && e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addTodo();
  });

  /* ── INIT ── */
  tick(); setInterval(tick, 1000);
  renderEmps(); renderTodos();
</script>
</body>
</html>
